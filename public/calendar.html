<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leave Calendar - Leave Management</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Leave System</h2>
      </div>
      <ul class="sidebar-nav">
        <li><a href="/dashboard.html">Dashboard</a></li>
        <li><a href="/leave-request.html">Request Leave</a></li>
        <li><a href="/balance.html">My Balances</a></li>
        <li><a href="/calendar.html" class="active">Calendar</a></li>
      </ul>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Top Header -->
      <header class="top-header">
        <div class="user-info">
          <span id="userName">Loading...</span>
          <span class="role-badge employee" id="userRole">Employee</span>
        </div>
        <button class="btn-logout" onclick="removeToken()">Logout</button>
      </header>

      <!-- Content -->
      <main class="content">
        <h1>Leave Calendar</h1>

        <div class="card">
          <!-- Calendar Header -->
          <div class="calendar-header">
            <div class="calendar-nav">
              <button onclick="prevMonth()">← Prev</button>
              <select id="monthSelect"></select>
              <select id="yearSelect"></select>
              <button onclick="nextMonth()">Next →</button>
            </div>
          </div>

          <!-- Calendar Grid -->
          <div class="calendar-grid" id="calendarGrid">
            <!-- Generated by JS -->
          </div>

          <!-- Legend -->
          <div class="calendar-legend">
            <div class="legend-item">
              <div class="legend-color" style="background-color: var(--success);"></div>
              <span>Vacation</span>
            </div>
            <div class="legend-item">
              <div class="legend-color" style="background-color: var(--danger);"></div>
              <span>Sick Leave</span>
            </div>
            <div class="legend-item">
              <div class="legend-color" style="background-color: var(--primary);"></div>
              <span>Personal Leave</span>
            </div>
            <div class="legend-item">
              <div class="legend-color" style="background-color: #FEF3C7;"></div>
              <span>Company Holiday</span>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Leave Details Modal -->
  <div class="modal-overlay" id="leaveModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Leave Details</h3>
      </div>
      <div class="modal-body" id="leaveDetails"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Close</button>
      </div>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/calendar.js"></script>
</body>
</html>
